# Sales Forecasting Configuration

# Data configuration
data:
  raw_data_path: "data/raw/"
  processed_data_path: "data/processed/"
  date_column: "date"
  target_column: "sales"
  frequency: "M"  # Monthly
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  min_train_length: 12
  forecast_horizon: 6
  generate_synthetic: true
  synthetic_start_date: "2020-01-01"
  synthetic_end_date: "2024-12-31"
  synthetic_trend: 0.05
  synthetic_seasonality: 0.1
  synthetic_noise: 0.05

# Model configuration
model:
  models: ["linear", "arima", "xgboost", "lightgbm", "lstm"]
  random_state: 42
  arima_order: [1, 1, 1]
  arima_seasonal_order: [1, 1, 1, 12]
  prophet_yearly_seasonality: true
  prophet_weekly_seasonality: false
  prophet_daily_seasonality: false
  prophet_changepoint_prior_scale: 0.05
  xgb_n_estimators: 100
  xgb_max_depth: 6
  xgb_learning_rate: 0.1
  lstm_sequence_length: 12
  lstm_hidden_size: 50
  lstm_num_layers: 2
  lstm_dropout: 0.2
  lstm_epochs: 100
  lstm_batch_size: 32

# Evaluation configuration
evaluation:
  metrics: ["mae", "rmse", "mape", "smape", "mase"]
  business_metrics: ["service_level", "inventory_turns", "stockout_rate"]
  cross_validation_folds: 5
  confidence_intervals: true
  confidence_level: 0.95
  stockout_cost: 10.0
  holding_cost: 1.0
  service_level_target: 0.95

# General settings
project_name: "sales_forecasting"
output_dir: "outputs"
log_level: "INFO"
seed: 42
